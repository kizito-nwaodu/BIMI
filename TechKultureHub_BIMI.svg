<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.2" baseProfile="tiny-ps"
     viewBox="0 0 512 512"
     width="512" height="512">
  <title>TechKulture Hub</title>

  <!-- Background circle (white fill for email clients) -->
  <circle cx="256" cy="256" r="256" fill="#ffffff"/>

  <!-- Cloud shape (behind shield) -->
  <path d="
    M 160 290
    Q 130 290 115 270
    Q 100 250 115 230
    Q 125 215 142 213
    Q 142 195 155 183
    Q 168 171 185 172
    Q 190 155 207 148
    Q 224 141 240 150
    Q 250 138 265 137
    Q 285 136 298 150
    Q 315 143 330 155
    Q 342 165 342 180
    Q 357 182 366 195
    Q 378 212 370 230
    Q 382 242 382 258
    Q 382 278 368 290
    Q 354 302 335 302
    L 178 302
    Q 160 302 160 290 Z
  " fill="none" stroke="#1a3a6b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Shield body -->
  <path d="
    M 256 158
    L 204 178
    L 204 228
    Q 204 268 256 292
    Q 308 268 308 228
    L 308 178
    Z
  " fill="url(#shieldGrad)" stroke="#1a3a6b" stroke-width="6" stroke-linejoin="round"/>

  <!-- Shield checkmark -->
  <polyline points="228,235 248,255 282,215"
    fill="none" stroke="#ffffff" stroke-width="12"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text: TechKulture -->
  <text x="256" y="345"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="46"
    fill="#1a3a6b"
    text-anchor="middle"
    letter-spacing="-1">TechKulture</text>

  <!-- Divider lines flanking "Hub" -->
  <line x1="148" y1="368" x2="210" y2="368" stroke="#4a7ec7" stroke-width="2"/>
  <line x1="302" y1="368" x2="364" y2="368" stroke="#4a7ec7" stroke-width="2"/>

  <!-- Text: Hub -->
  <text x="256" y="378"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="36"
    fill="#4a7ec7"
    text-anchor="middle"
    letter-spacing="3">Hub</text>

  <!-- Tagline -->
  <text x="256" y="420"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="18"
    fill="#666666"
    text-anchor="middle"
    letter-spacing="0.5">Empowering Business. Delivering Tomorrow.</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7ec7"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
  </defs>

</svg>
